<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        header {
            margin-bottom: 30px;
        }

        a {
            color: #1565c0;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .meta {
            color: #666;
            font-size: 0.9rem;
        }

        .nav a {
            margin-right: 15px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <a href="{% url 'blogs:home' %}">Blog</a>
        </h1>

        <div class="nav">
            <a href="{% url 'blogs:new_blog' %}">New Blog</a>
            <a href="{% url 'blogs:new_post' %}">New Post</a>
        </div>
    </header>

    {% block content %}{% endblock content %}
</body>
</html>
