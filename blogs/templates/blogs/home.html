{% extends 'blogs/base.html' %}

{% block content %}
<h2>All Posts</h2>

{% for post in posts %}
<div class="card">
    <h3>{{ post.title }}</h3>

    <p class="meta">
        Blog: {{ post.blog.title }} |
        Added: {{ post.date_added|date:"M d, Y H:i" }}
    </p>

    <p>{{ post.content }}</p>

    <p>
        <a href="{% url 'blogs:edit_post' post.pk %}">Edit post</a>
    </p>
</div>
{% empty %}
<p>No posts yet.</p>
{% endfor %}
{% endblock content %}
