{% extends 'blogs/base.html' %}

{% block content %}
    {% if object %}
        <h2>Edit Post</h2>
    {% else %}
        <h2>Create a New Post</h2>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save post</button>
    </form>
{% endblock content %}
